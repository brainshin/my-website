<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">Study note publishing flow</title>
  <desc id="desc">A simple flow diagram from learning topic to markdown note and GitHub Pages publishing.</desc>
  <rect width="960" height="360" rx="18" fill="#f6f4ee"/>
  <rect x="48" y="70" width="190" height="150" rx="12" fill="#ffffff" stroke="#d9d4c8"/>
  <rect x="286" y="70" width="190" height="150" rx="12" fill="#ffffff" stroke="#d9d4c8"/>
  <rect x="524" y="70" width="190" height="150" rx="12" fill="#ffffff" stroke="#d9d4c8"/>
  <rect x="762" y="70" width="150" height="150" rx="12" fill="#111827"/>

  <text x="143" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#111827">Topic</text>
  <text x="143" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#626b74">배운 내용 선택</text>

  <text x="381" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#111827">Markdown</text>
  <text x="381" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#626b74">표, 링크, 이미지 정리</text>

  <text x="619" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#111827">Review</text>
  <text x="619" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#626b74">미리보기와 링크 확인</text>

  <text x="837" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#ffffff">Publish</text>
  <text x="837" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#d1d5db">GitHub Pages</text>

  <path d="M246 145H278" stroke="#2563eb" stroke-width="4" stroke-linecap="round"/>
  <path d="M270 136l10 9-10 9" fill="none" stroke="#2563eb" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M484 145H516" stroke="#15803d" stroke-width="4" stroke-linecap="round"/>
  <path d="M508 136l10 9-10 9" fill="none" stroke="#15803d" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M722 145H754" stroke="#c2410c" stroke-width="4" stroke-linecap="round"/>
  <path d="M746 136l10 9-10 9" fill="none" stroke="#c2410c" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="480" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#626b74">docs/ 하위 문서와 assets/ 이미지 파일을 연결해서 하나의 문서 사이트로 관리</text>
</svg>
