<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f4ee;
      --surface: #ffffff;
      --surface-soft: #ebe7dd;
      --text: #1f2328;
      --muted: #626b74;
      --line: #d9d4c8;
      --blue: #2563eb;
      --green: #15803d;
      --orange: #c2410c;
      --ink: #111827;
      --shadow: 0 18px 45px rgba(31, 35, 40, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.65;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid rgba(217, 212, 200, 0.82);
      background: rgba(246, 244, 238, 0.92);
      backdrop-filter: blur(16px);
    }

    .nav,
    .page,
    .footer-inner {
      width: min(1120px, calc(100% - 40px));
      margin: 0 auto;
    }

    .nav {
      min-height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
      font-weight: 800;
    }

    .brand img {
      width: 38px;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      object-fit: cover;
      background: var(--surface);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 650;
    }

    .nav-links a {
      padding: 8px 10px;
      border-radius: 7px;
    }

    .nav-links a:hover {
      background: var(--surface-soft);
      color: var(--text);
    }

    .page {
      padding: 72px 0 74px;
    }

    .content > h1:first-child {
      max-width: 820px;
      margin: 0;
      color: var(--ink);
      font-size: clamp(42px, 7vw, 78px);
      line-height: 1.02;
      letter-spacing: 0;
    }

    .content > h1:first-child + p {
      max-width: 680px;
      margin: 24px 0 0;
      color: var(--muted);
      font-size: 18px;
    }

    .content > h1:first-child + p + p {
      margin: 32px 0 48px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .content > h1:first-child + p + p a {
      min-height: 46px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      font-weight: 780;
      box-shadow: 0 10px 24px rgba(31, 35, 40, 0.06);
    }

    .content > h1:first-child + p + p a:first-child {
      border-color: var(--ink);
      background: var(--ink);
      color: #ffffff;
    }

    .content h2 {
      margin: 56px 0 18px;
      color: var(--ink);
      font-size: 28px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .content h2:first-of-type {
      margin-top: 34px;
    }

    .content ul {
      margin: 0;
      padding: 8px;
      list-style: none;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .content li {
      padding: 16px 14px;
      color: var(--muted);
    }

    .content li + li {
      border-top: 1px solid #ede9df;
    }

    .content li strong {
      display: block;
      margin-bottom: 2px;
      color: var(--ink);
      font-size: 16px;
    }

    .content h3 {
      margin: 0;
      color: var(--ink);
      font-size: 21px;
      letter-spacing: 0;
    }

    .content h3 + p {
      margin: 8px 0 0;
      color: var(--muted);
    }

    .content h2#categories ~ h3 {
      margin-top: 16px;
      padding: 20px 20px 0;
      border: 1px solid var(--line);
      border-bottom: 0;
      border-radius: 8px 8px 0 0;
      background: var(--surface);
      box-shadow: 0 12px 30px rgba(31, 35, 40, 0.05);
    }

    .content h2#categories ~ h3 + p {
      margin: 0 0 16px;
      min-height: 76px;
      padding: 8px 20px 20px;
      border: 1px solid var(--line);
      border-top: 0;
      border-radius: 0 0 8px 8px;
      background: var(--surface);
      box-shadow: 0 12px 30px rgba(31, 35, 40, 0.05);
    }

    .site-footer {
      border-top: 1px solid var(--line);
      padding: 24px 0 34px;
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 820px) {
      .nav,
      .page,
      .footer-inner {
        width: min(100% - 28px, 1120px);
      }

      .nav-links {
        display: none;
      }

      .page {
        padding: 48px 0 56px;
      }

      .content > h1:first-child {
        font-size: 44px;
      }

      .content > h1:first-child + p {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <nav class="nav" aria-label="메인 메뉴">
      <a class="brand" href="{{ '/' | relative_url }}">
        <img src="https://github.com/brainshin.png" alt="Brainshin profile image">
        <span>Brainshin Notes</span>
      </a>
      <div class="nav-links">
        <a href="{{ '/#categories' | relative_url }}">Categories</a>
        <a href="https://github.com/brainshin">GitHub</a>
      </div>
    </nav>
  </header>

  <main class="page">
    <article class="content">
      {{ content }}
    </article>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">© 2026 Brainshin. Built with GitHub Pages.</div>
  </footer>
</body>
</html>
